<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-glow"></div>

    <div class="eid-container">
        <h1 class="eid-text">
            <span>E</span><span>i</span><span>d</span>
            <br>
            <span>M</span><span>u</span><span>b</span><span>a</span><span>r</span><span>a</span><span>k</span>
        </h1>

        <div class="sheep-wrapper">
            <div class="sheep">
                <div class="horn left"></div>
                <div class="horn right"></div>
                <div class="head-wool"></div>
                <div class="face">
                    <div class="eye left"></div>
                    <div class="eye right"></div>
                    <div class="smile"></div>
                </div>
                <div class="ear left"></div>
                <div class="ear right"></div>
                <div class="body-wool"></div>
                <div class="legs">
                    <div class="leg"></div>
                    <div class="leg"></div>
                    <div class="leg"></div>
                    <div class="leg"></div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
