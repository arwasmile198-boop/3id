<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak - Moving Stars & Sheep Side Profile</title>
    <link rel="stylesheet" href="style.css">
    <!-- استدعاء خطوط مميزة من جوجل -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

    <!-- 1. طبقات النجوم المتحركة -->
    <div class="stars-container">
        <div class="stars_1"></div>
        <div class="stars_2"></div>
        <div class="stars_3"></div>
    </div>

    <!-- 2. الزينة على الأطراف -->
    <div class="decorations">
        <div class="fanoos left"></div>
        <div class="garland top-left"></div>
        <div class="fanoos right"></div>
        <div class="garland top-right"></div>
    </div>

    <!-- 3. المحتوى الرئيسي -->
    <div class="main-content">
        <!-- النص الإنجليزي المتحرك -->
        <h1 class="eid-text">Eid Mubarak</h1>

        <!-- 4. خروف العيد واقف بالعرض -->
        <div class="sheep-side-wrapper">
            <div class="sheep-side">
                <!-- الرأس والقرن (في الأمام) -->
                <div class="head-side">
                    <div class="horn-side"></div>
                    <div class="eye-side"></div>
                    <div class="ear-side"></div>
                </div>
                <!-- الجسم (الجانب) -->
                <div class="body-side-wool"></div>
                <!-- الأرجل الجانبية (4 أرجل ظاهرة) -->
                <div class="legs-side">
                    <div class="leg-side back"></div>
                    <div class="leg-side back-far"></div>
                    <div class="leg-side front-far"></div>
                    <div class="leg-side front"></div>
                </div>
                <!-- الذيل -->
                <div class="tail-side"></div>
            </div>
        </div>
    </div>

</body>
</html>
